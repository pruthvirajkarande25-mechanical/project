<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heat Flow Project</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

header{
background:#222;
color:white;
padding:20px;
}

.container{
margin-top:30px;
}

input{
padding:12px;
width:250px;
margin:10px;
border-radius:8px;
border:1px solid gray;
}

button{
padding:12px 25px;
background:#ff5733;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#e74c3c;
}

.result{
font-size:24px;
margin-top:20px;
color:green;
}

.box{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:15px;
box-shadow:0px 0px 10px gray;
}
</style>

</head>

<body>

<header>
<h1>🔥 Heat Flow Simulation</h1>
</header>

<div class="container">

<div class="box">

<p>Formula Used:</p>
<p><b>q = k × A × (T1 - T2) / L</b></p>

<input type="number" id="t1" placeholder="Temperature 1"><br> <input type="number" id="t2" placeholder="Temperature 2"><br> <input type="number" id="k" placeholder="Thermal Conductivity"><br> <input type="number" id="a" placeholder="Area"><br> <input type="number" id="l" placeholder="Length"><br>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

</div>

<script>
function calculate(){

let t1=parseFloat(document.getElementById("t1").value);
let t2=parseFloat(document.getElementById("t2").value);
let k=parseFloat(document.getElementById("k").value);
let a=parseFloat(document.getElementById("a").value);
let l=parseFloat(document.getElementById("l").value);

let q=(k*a*(t1-t2))/l;

document.getElementById("result").innerHTML=
"Heat Flow = "+q.toFixed(2)+" Watt";

}
</script>

</body>
</html>
